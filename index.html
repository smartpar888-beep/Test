<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTT Smart Water Platform | Professional Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        :root {
            --bg-primary: #e5e7eb;
            --bg-secondary: #ffffff;
            --panel-bg: #ffffff;
            --border-color: rgba(59, 130, 246, 0.1);
            --text-main: #1e293b;
            --text-secondary: #64748b;
            --color-blue: #3b82f6;
            --color-green: #10b981;
            --color-critical: #ef4444;
            --color-warning: #f59e0b;
            --shadow-sm: 0 1px 2px 0 rgba(59, 130, 246, 0.06);
            --shadow-md: 0 4px 6px -1px rgba(59, 130, 246, 0.12);
            --shadow-lg: 0 10px 15px -3px rgba(59, 130, 246, 0.15);
            
            /* 📍 6. ปรับขนาด ICON และตัวหนังสือ % ที่นี่ (ตัวแปรหลัก) */
            --icon-scale: 100%;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Kanit', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-primary);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        #header-panel {
            display: grid;
            grid-template-columns: 2.2fr 1fr 0.8fr;
            gap: 16px;
            padding: 20px 24px;
            background-color: var(--bg-secondary);
            min-height: 120px;
            border-bottom: 2px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }
        
        .responsive-text {
            font-size: clamp(16px, 2.5vw, 24px);
            font-weight: 600;
            text-align: center;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-blue);
        }
        
        #blue-block {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(59, 130, 246, 0.04) 100%);
            border-radius: 12px;
            border: 1.5px solid var(--border-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        #blue-block:hover {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.12) 0%, rgba(59, 130, 246, 0.08) 100%);
            box-shadow: var(--shadow-sm);
        }
        
        #blue-block h1 {
            margin: 0;
            letter-spacing: -0.5px;
        }
        
        #green-block {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.08) 0%, rgba(34, 197, 94, 0.04) 100%);
            border-radius: 12px;
            border: 1.5px solid rgba(16, 185, 129, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            transition: all 0.3s ease;
            padding: 12px 16px;
        }
        
        #green-block:hover {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.12) 0%, rgba(34, 197, 94, 0.08) 100%);
        }
        
        #w-temp {
            font-size: 32px;
            font-weight: 600;
            color: var(--color-green);
            letter-spacing: -1px;
        }
        
        #w-info {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 400;
            margin-top: 4px;
        }
        
        #right-group {
            display: grid;
            grid-template-rows: repeat(4, 1fr);
            gap: 8px;
        }
        
        .header-btn {
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(11px, 1.8vw, 13px);
            border: 1.5px solid var(--border-color);
            background-color: var(--bg-secondary);
            transition: all 0.3s ease;
            cursor: pointer;
            padding: 0 12px;
        }
        
        .header-btn:hover {
            background-color: var(--bg-primary);
            border-color: var(--color-blue);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }
        
        #red-block {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.06) 0%, rgba(249, 115, 115, 0.04) 100%);
            border: 1.5px solid rgba(239, 68, 68, 0.2);
            color: #dc2626;
            font-weight: 600;
        }
        
        #red-block:hover {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1) 0%, rgba(249, 115, 115, 0.08) 100%);
            border-color: rgba(239, 68, 68, 0.3);
        }
        
        #purple-block {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(99, 102, 241, 0.06) 100%);
            border: 1.5px solid rgba(59, 130, 246, 0.2);
            color: var(--color-blue);
            font-weight: 600;
        }
        
        #purple-block:hover {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15) 0%, rgba(99, 102, 241, 0.1) 100%);
            border-color: rgba(59, 130, 246, 0.3);
        }
        
        #yellow-block {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, rgba(251, 191, 36, 0.06) 100%);
            border: 1.5px solid rgba(245, 158, 11, 0.2);
            color: #d97706;
            font-weight: 600;
        }
        
        #yellow-block:hover {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.15) 0%, rgba(251, 191, 36, 0.1) 100%);
            border-color: rgba(245, 158, 11, 0.3);
        }
        
        #pink-block {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1) 0%, rgba(74, 222, 128, 0.06) 100%);
            border: 1.5px solid rgba(34, 197, 94, 0.2);
            color: var(--color-green);
            font-weight: 600;
            padding: 0;
        }
        
        #pink-block:hover {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.15) 0%, rgba(74, 222, 128, 0.1) 100%);
            border-color: rgba(34, 197, 94, 0.3);
        }
        
        #pink-block select {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: var(--color-green);
            font-family: 'Kanit', sans-serif;
            font-weight: 600;
            font-size: inherit;
            cursor: pointer;
            text-align-last: center;
            padding: 6px 12px;
            appearance: none;
        }
        
        #map-area {
            flex-grow: 1;
            position: relative;
        }
        
        #map {
            width: 100%;
            height: 100%;
        }

        /* ── Marker label ── */
        .mlabel {
            font-family: 'Kanit', sans-serif !important;
            /* 📍 6. ปรับสเกลตัวอักษรของ Icon */
            font-size: calc(12px * var(--icon-scale)) !important;
            font-weight: 600 !important;
            color: #ffffff !important;
            background: transparent !important;
            border: none !important;
            text-shadow:
                -1px -1px 0 rgba(59, 130, 246, 0.5),
                 1px -1px 0 rgba(59, 130, 246, 0.5),
                -1px  1px 0 rgba(59, 130, 246, 0.5),
                 1px  1px 0 rgba(59, 130, 246, 0.5),
                 0px  2px 4px rgba(59, 130, 246, 0.3) !important;
            white-space: nowrap !important;
            padding: 0 !important;
            margin-top: 2px !important;
        }

        /* ── Data Chart Overlay (Pop-up) ── */
        #chart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(59, 130, 246, 0.15);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
            backdrop-filter: blur(4px);
        }
        
        .chart-modal {
            background: linear-gradient(135deg, #ffffff 0%, #f0f4f9 100%);
            padding: 28px;
            border-radius: 16px;
            position: relative;
            width: 70vw;
            max-width: 1000px;
            height: 65vh;
            box-shadow: 0 20px 50px rgba(59, 130, 246, 0.15);
            border: 2px solid rgba(59, 130, 246, 0.15);
            display: flex;
            flex-direction: column;
        }
        
        .chart-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid rgba(59, 130, 246, 0.12);
        }
        
        .chart-modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--color-blue);
        }
        
        .chart-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .chart-range-select {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.06) 0%, rgba(59, 130, 246, 0.03) 100%);
            border: 1.5px solid rgba(59, 130, 246, 0.15);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 8px;
            font-family: 'Kanit', sans-serif;
            font-weight: 500;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }
        
        .chart-range-select:hover {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(59, 130, 246, 0.06) 100%);
            border-color: var(--color-blue);
        }
        
        .chart-container {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
        }
        
        .chart-container canvas {
            max-height: 100%;
        }
        
        .close-chart {
            position: absolute;
            top: 16px;
            right: 16px;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            border: none;
            border-radius: 10px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
            z-index: 10002;
            transition: all 0.3s ease;
        }
        
        .close-chart:hover {
            transform: scale(1.12);
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.4);
        }

        /* ── Pump Status Pop-up ── */
        #pump-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(59, 130, 246, 0.15);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
            backdrop-filter: blur(4px);
        }

        .pump-modal {
            background: linear-gradient(135deg, #ffffff 0%, #f0f4f9 100%);
            padding: 32px;
            border-radius: 16px;
            position: relative;
            width: 400px;
            box-shadow: 0 20px 50px rgba(59, 130, 246, 0.15);
            border: 2px solid rgba(59, 130, 246, 0.15);
        }

        .pump-modal-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid rgba(59, 130, 246, 0.12);
        }

        .pump-modal-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--color-blue);
        }

        .pump-status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 12px;
        }

        .pump-status-badge.normal {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(34, 197, 94, 0.1) 100%);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .pump-status-badge.warning {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2) 0%, rgba(251, 191, 36, 0.1) 100%);
            color: #d97706;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .pump-status-badge.critical {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(249, 115, 115, 0.1) 100%);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .pump-info {
            margin: 16px 0;
            padding: 12px;
            background: rgba(59, 130, 246, 0.05);
            border-left: 3px solid var(--color-blue);
            border-radius: 4px;
        }

        .pump-info-label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .pump-info-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
        }

        .pump-info-value .unit {
            font-size: 14px;
            font-weight: 500;
            margin-left: 8px;
            opacity: 0.7;
        }

        .pump-stations-info {
            background: rgba(59, 130, 246, 0.05);
            padding: 14px;
            border-radius: 8px;
            text-align: center;
            margin-top: 16px;
        }

        .pump-stations-count {
            font-size: 28px;
            font-weight: 700;
            color: var(--color-blue);
        }

        .pump-stations-label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 4px;
        }

        .close-pump {
            position: absolute;
            top: 16px;
            right: 16px;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            border: none;
            border-radius: 10px;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-weight: 600;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
            z-index: 10002;
            transition: all 0.3s ease;
        }

        .close-pump:hover {
            transform: scale(1.12);
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.4);
        }

        /* ── CCTV toast notification ── */
        #cctv-toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, #ffffff 0%, #f0f4f9 100%);
            border: 2px solid var(--color-green);
            color: var(--text-main);
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 10001;
            opacity: 0;
            transition: all 0.4s ease;
            white-space: nowrap;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.2);
            pointer-events: none;
        }
        
        #cctv-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 📍 4. ปรับโครงสร้าง CSS กล่อง Debug ให้พับเป็นบาร์ได้ */
        #debug-log {
            position: fixed;
            bottom: 16px;
            left: 16px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(240, 244, 249, 0.95) 100%);
            color: var(--color-blue);
            font-size: 11px;
            border-radius: 8px;
            z-index: 9999;
            width: 340px;
            border: 1.5px solid rgba(59, 130, 246, 0.15);
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .debug-header {
            padding: 8px 14px;
            background: rgba(59, 130, 246, 0.1);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
        }
        
        .debug-header:hover {
            background: rgba(59, 130, 246, 0.15);
        }

        #debug-content {
            padding: 8px 14px;
            max-height: 150px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', monospace;
        }

        /* เมื่อมี class minimized จะซ่อนเนื้อหาและลดขนาดกล่องลงเป็นบาร์ */
        #debug-log.minimized #debug-content {
            display: none;
        }
        
        #debug-log.minimized {
            width: 160px;
        }
        
        .toggle-icon {
            background: var(--color-blue);
            color: white;
            border-radius: 4px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="header-panel">
    <div id="blue-block"><h1 class="responsive-text">MTT Smart Water Platform</h1></div>
    <div id="green-block">
        <div id="w-temp" style="">--°C</div>
        <div id="w-info" style="">กำลังโหลด...</div>
    </div>
    <div id="right-group">
        <div id="red-block" class="header-btn">
            <span id="c-date">--/--/--</span>&nbsp;|&nbsp;<span id="c-time">00:00:00</span>
        </div>
        
        <a href="#" id="purple-block" class="header-btn">หน้าสรุป 1</a>
        
        <a href="#" id="yellow-block" class="header-btn">หน้าสรุป 2</a>
        
        <div id="pink-block" class="header-btn">
            <select id="map-filter" onchange="updateView(this.value)">
                <option value="all">แสดงทั้งหมด</option>
                <option value="water">1. ระดับน้ำ (Staff)</option>
                <option value="air">2. อากาศ (AQI)</option>
                <option value="rain">3. ปริมาณฝน (Rain)</option>
                <option value="cctv">4. กล้อง CCTV</option>
                <option value="pump">5. สถานีปั๊ม</option>
            </select>
        </div>
    </div>
</div>

<div id="map-area"><div id="map"></div></div>

<div id="chart-overlay">
    <div class="chart-modal">
        <button class="close-chart" onclick="closeChart()">✕</button>
        <div class="chart-modal-header">
            <div class="chart-modal-title" id="chart-title">📊 ข้อมูลย้อนหลัง</div>
            <div class="chart-controls">
                <select id="chart-range" class="chart-range-select" onchange="updateChart()">
                    <option value="week">สัปดาห์</option>
                    <option value="month" selected>เดือน</option>
                    <option value="year">ปี</option>
                </select>
            </div>
        </div>
        <div class="chart-container">
            <canvas id="historical-chart"></canvas>
        </div>
    </div>
</div>

<div id="pump-overlay">
    <div class="pump-modal">
        <button class="close-pump" onclick="closePumpPopup()">✕</button>
        <div class="pump-modal-header">
            <div>💧</div>
            <div class="pump-modal-title" id="pump-name">ชื่อปั๊ม</div>
            <span class="pump-status-badge normal" id="pump-status">Normal</span>
        </div>
        <div class="pump-info">
            <div class="pump-info-label">กำลังระบายน้ำสูงสุด</div>
            <div class="pump-info-value">
                <span id="pump-flow">0</span>
                <span class="unit">ลบ.ม./วินาที</span>
            </div>
        </div>
        <div class="pump-stations-info">
            <div class="pump-stations-count" id="pump-total-count">14</div>
            <div class="pump-stations-label">สถานีปั๊มทั้งหมด</div>
        </div>
    </div>
</div>

<div id="cctv-toast">📹 <span id="cctv-toast-name"></span> — กำลังเปิดหน้าต่างใหม่...</div>

<div id="debug-log">
    <div class="debug-header" onclick="toggleDebugMinimize()">
        <span>📝 Status Log</span>
        <span class="toggle-icon">−</span>
    </div>
    <div id="debug-content">
        🔌 กำลังเริ่มต้น...
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

<script>
    const logEl = document.getElementById('debug-log');
    const logContent = document.getElementById('debug-content');
    
    // ─── Debug Log Minimize Function ───────────────────────────────────────
    function toggleDebugMinimize() {
        logEl.classList.toggle('minimized');
        const icon = logEl.querySelector('.toggle-icon');
        icon.innerText = logEl.classList.contains('minimized') ? '+' : '−';
    }

    function log(msg) { 
        console.log(msg); 
        logContent.innerHTML = logContent.innerHTML.replace('🔌 กำลังเริ่มต้น...', '');
        logContent.innerHTML += '<br>' + msg; 
        if (!logEl.classList.contains('minimized')) {
            logContent.scrollTop = logContent.scrollHeight;
        }
    }

    const CCTV_LIST = [
        { id: 'cam1', name: 'ท่าน้ำปากเกร็ด', lat: 13.915175749831878, lng: 100.49444034136957, url: 'https://www.pakkretconnect.com/liffwater/eon' },
        { id: 'cam2', name: 'คลองบางพูด ประตูน้ำปากเกร็ด 13', lat: 13.925051545362829, lng: 100.50061836537286, url: 'https://www.pakkretconnect.com/liffwater/cctv2' },
        { id: 'cam3', name: 'คลองบางพูด เกาะพญาเจ่ง', lat: 13.91058624286773, lng: 100.51841664226215, url: 'https://www.pakkretconnect.com/liffwater/cctv3' },
        { id: 'cam4', name: 'คลองบางพูด เชื่องคลองส่วย', lat: 13.90731385376002, lng: 100.54338309204739, url: 'https://www.pakkretconnect.com/liffwater/cctv4' },
    ];

    const PUMP_LIST = [
        { id: 'pump1', name: 'Pumping Station 2', lat: 13.917655968170465, lng: 100.54319371102274, flow: 0.45, status: 'normal' },

    function parseFirestoreTimestamp(timestamp) {
        if (!timestamp) return null;
        if (timestamp.toDate && typeof timestamp.toDate === 'function') return timestamp.toDate();
        if (typeof timestamp === 'object' && timestamp.seconds !== undefined) return new Date(timestamp.seconds * 1000);
        if (typeof timestamp === 'string') return new Date(timestamp);
        if (timestamp instanceof Date) return timestamp;
        return null;
    }

    function filterDataByRange(range, allData) {
        const now       = new Date();
        const days      = range === 'week' ? 7 : range === 'year' ? 365 : 30;
        const startDate = new Date(now);
        startDate.setDate(startDate.getDate() - days);
        startDate.setHours(0, 0, 0, 0);

        log(`📊 ช่วง: ${startDate.toLocaleDateString('th-TH')} → ${now.toLocaleDateString('th-TH')}`);

        const filtered = [];
        allData.forEach(item => {
            const itemDate = parseFirestoreTimestamp(item.timestamp);
            if (itemDate && itemDate >= startDate && itemDate <= now) {
                filtered.push({ date: itemDate, value: parseFloat(item.final_value) || 0 });
            }
        });

        filtered.sort((a, b) => a.date - b.date);
        log(`📊 ผลลัพธ์: ${filtered.length} records`);
        return filtered;
    }

    function updateChart() {
        if (!currentChartData) return;

        const range                          = document.getElementById('chart-range').value;
        const { type, pointId, pointName, unit, color } = currentChartData;

        const pointData = allHistoricalData[type][pointId] || [];
        log(`📊 records ทั้งหมดของ point ${pointId}: ${pointData.length}`);

        const filtered = filterDataByRange(range, pointData);

        const labels = filtered.map(item =>
            item.date.toLocaleDateString('th-TH',
                range === 'year'
                    ? { month: 'short' }
                    : { month: 'short', day: 'numeric' }
            )
        );
        const data = filtered.map(item => item.value);

        if (data.length === 0) {
            log(`⚠️ ไม่มีข้อมูลใน range นี้ — แสดง mock data`);
            const dayCount = range === 'week' ? 7 : range === 'month' ? 30 : 365;
            for (let i = dayCount - 1; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                labels.push(d.toLocaleDateString('th-TH', { month: 'short', day: 'numeric' }));
                data.push(+(50 + Math.random() * 20).toFixed(2));
            }
        }

        if (chartInstance) { chartInstance.destroy(); }

        chartInstance = new Chart(document.getElementById('historical-chart'), {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label:                `${pointName} (${unit})`,

            options: {

        const top  = Math.round((window.screen.height - h) / 2);
        window.open(url, 'cctv_' + name,
            `width=${w},height=${h},left=${left},top=${top},toolbar=no,menubar=no,scrollbars=yes,resizable=yes`

        const toast = document.getElementById('cctv-toast');
        document.getElementById('cctv-toast-name').innerText = name;

    function syncFirestore(collectionName, type) {
        log(`📡 listen: ${collectionName}`);
        db.collection(collectionName).onSnapshot(
            (snapshot) => {
                log(`📦 ${collectionName}: ${snapshot.size} docs`);

                const historyMap = {};
                const latestMap  = {};

                snapshot.forEach(doc => {
                    const d   = doc.data();
                    const pid = String(d.point_id !== undefined ? d.point_id : doc.id);

                    if (!historyMap[pid]) historyMap[pid] = [];
                    historyMap[pid].push(d);

                    const ts = parseFirestoreTimestamp(d.timestamp);
                    const existingTs = latestMap[pid]
                        ? parseFirestoreTimestamp(latestMap[pid].timestamp)
                        : null;

                    if (!existingTs || (ts && ts > existingTs)) {
                        latestMap[pid] = d;
                    }
                });

                allHistoricalData[type] = historyMap;

                Object.values(markers[type]).forEach(m => m.setMap(null));
                markers[type] = {};

                Object.entries(latestMap).forEach(([pid, d]) => {
                    renderMarker(type, pid, d);
                });
            },
            (err) => log(`❌ Firestore error: ${err.message}`)
        );
    }

    function buildIcon(type, cur, color) {
        let svgBody = "";

        if (type === 'water') {
            const pct   = Math.max(0, Math.min(cur / 100, 1));
            const tankH = 36; const tankY = 10; const tankX = 10; const tankW = 24;
            const fillH = Math.round(tankH * pct);
            const fillY = tankY + tankH - fillH;
            svgBody = `
              <ellipse cx="22" cy="58" rx="10" ry="3" fill="rgba(59, 130, 246, 0.15)"/>
              <rect x="${tankX}" y="${tankY}" width="${tankW}" height="${tankH}" rx="5" fill="#f0f4f9" stroke="rgba(59, 130, 246, 0.2)" stroke-width="1.5"/>
              <rect x="${tankX}" y="${fillY}" width="${tankW}" height="${fillH}" fill="${color}" opacity="0.9"/>
              <rect x="${tankX+2}" y="${tankY+2}" width="4" height="${tankH-4}" rx="2" fill="rgba(255,255,255,0.25)"/>
              <rect x="${tankX}" y="${tankY}" width="${tankW}" height="${tankH}" rx="5" fill="none" stroke="${color}" stroke-width="1.5" opacity="0.5"/>
              <text x="22" y="8" text-anchor="middle" font-size="9" fill="${color}">💧</text>
            `;
        } else if (type === 'air') {
            svgBody = `
              <ellipse cx="22" cy="56" rx="10" ry="3" fill="rgba(59, 130, 246, 0.15)"/>
              <circle cx="22" cy="26" r="20" fill="#f0f4f9" stroke="${color}" stroke-width="2" opacity="0.95"/>
              <circle cx="22" cy="26" r="14" fill="${color}" opacity="0.85"/>
              <text x="22" y="22" text-anchor="middle" font-size="8" fill="white" font-weight="bold">AQI</text>
              <text x="22" y="33" text-anchor="middle" font-size="9" fill="white" font-weight="600">${Math.round(cur)}</text>
            `;
        } else if (type === 'rain') {
            const pct   = Math.max(0, Math.min(cur / 50, 1));
            svgBody = `
              <ellipse cx="22" cy="56" rx="10" ry="3" fill="rgba(59, 130, 246, 0.15)"/>
              <circle cx="22" cy="26" r="20" fill="#f0f4f9" stroke="${color}" stroke-width="2" opacity="0.95"/>
              <circle cx="22" cy="26" r="${14 * pct + 6}" fill="${color}" opacity="0.85"/>
              <text x="22" y="22" text-anchor="middle" font-size="8" fill="white" font-weight="bold">🌧️</text>
              <text x="22" y="33" text-anchor="middle" font-size="9" fill="white" font-weight="600">${Math.round(cur)}</text>
            `;
        }

        return svgBody;
    }

    function renderMarker(type, pointId, pointData) {
        const lat   = parseFloat(pointData.latitude)  || 0;
        const lng   = parseFloat(pointData.longitude) || 0;
        const value = parseFloat(pointData.final_value) || 0;

        let color = '#3b82f6';
        if      (value < 30)  color = '#10b981'; // green
        else if (value < 70)  color = '#f59e0b'; // yellow
        else                  color = '#ef4444'; // red

        const svgBody = buildIcon(type, value, color);
        const svg = `<svg width="60" height="68" viewBox="0 0 60 68" xmlns="http://www.w3.org/2000/svg">${svgBody}</svg>`;

        const iconScale = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--icon-scale')) / 100;

        const marker = new google.maps.Marker({
            position: { lat, lng },
            map,
            title:    `${type}: ${value}`,
            icon: {
                url:        'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
                scaledSize: new google.maps.Size(Math.round(60 * iconScale), Math.round(68 * iconScale)),
                anchor:     new google.maps.Point(30 * iconScale, 68 * iconScale)
            }
        });

        marker.addListener('click', () => {
            const unit = type === 'water' ? 'cm' : type === 'air' ? 'AQI' : 'mm';
            openChart(type, pointId, `${type} (ID: ${pointId})`, unit, color);
        });

        markers[type][pointId] = marker;
    }

    function updateView(filter) {
        currentFilter = filter;
        log(`🎯 Filter: ${filter}`);

        ['water', 'air', 'rain', 'pump'].forEach(t => {
            Object.values(markers[t]).forEach(m => {
                const show = (filter === 'all' || filter === t);
                m.setMap(show ? map : null);
            });
        });

        cctvMarkers.forEach(m => m.setMap((filter === 'all' || filter === 'cctv') ? map : null));
        pumpMarkers.forEach(m => m.setMap((filter === 'all' || filter === 'pump') ? map : null));
    }

    function initMap() {
        map = new google.maps.Map(document.getElementById('map'), {
            zoom:   12,
            center: { lat: 13.9127835, lng: 100.5514641 },
            mapTypeControl: true,
            streetViewControl: true,
            styles: [
                { featureType: 'all', elementType: 'geometry', stylers: [{ color: '#f0f4f9' }] },
                { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#c9e4e8' }] }
            ]
        });

        initCCTVMarkers();
        initPumpMarkers();
        syncFirestore('water_data', 'water');
        syncFirestore('air_data', 'air');
        syncFirestore('rain_data', 'rain');

        log('✅ Map initialized');
    }

    window.addEventListener('load', () => {
        fetchWeather();
    });

    // 📍 6. ฟังก์ชันสำหรับการอัปเดตขนาด Icon และ Text ให้สามารถเรียกใช้ได้ทันที
    function updateIconSize(percentage) {
        document.documentElement.style.setProperty('--icon-scale', percentage + '%');
        log(`📏 Icon scale updated: ${percentage}%`);
        
        Object.values(markers).forEach(t => Object.values(t).forEach(m => m.setMap(null)));
        cctvMarkers.forEach(m => m.setMap(null));
        pumpMarkers.forEach(m => m.setMap(null));
        cctvMarkers = [];
        pumpMarkers = [];
        initCCTVMarkers();
        initPumpMarkers();
    }
</script>
